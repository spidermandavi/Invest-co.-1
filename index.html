<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Investment Game</title>

  <!-- ===== CSS (correct order) ===== -->

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/ui-trade.css">
  <link rel="stylesheet" href="css/ui-popup.css">
  <link rel="stylesheet" href="css/ui-podium.css">
  <link rel="stylesheet" href="css/animations.css">
</head>

<body>

<div class="container">

  <h1>Investment Game</h1>

  <!-- ===== SETUP ===== -->

  <div id="setup">
    <label>Players:
      <select id="playerCount">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </label>

```
<div id="playerNamesContainer"></div>

<label>Game Mode:
  <select id="gameMode">
    <option value="turns">Turns</option>
    <option value="money">Target Money</option>
  </select>
</label>

<input id="modeValue" placeholder="Enter value (e.g. 20 turns or 5000)" />

<button onclick="startGame()">Start Game</button>
```

  </div>

  <!-- ===== GAME ===== -->

  <div id="game" class="hidden">

```
<div id="infoBar"></div>

<div class="infoContainer">
  <button onclick="showInfo()">Info</button>
</div>

<!-- Buy/Sell toggle -->
<div class="tradeToggle" id="buySellToggle"></div>

<!-- Stock table -->
<table id="stockTable">
  <thead>
    <tr>
      <th>Company</th>
      <th>Price</th>
      <th>Change</th>
      <th>Owned</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Controls -->
<div class="buttons">
  <button class="leftBtn" onclick="endTurn()">End Turn</button>
  <button class="rightBtn danger" onclick="endGame(true)">End Game</button>
</div>
```

  </div>

  <!-- ===== PODIUM ===== -->

  <div id="podium" class="hidden">
    <div id="celebrationContainer">
      <div class="podiumBlock" id="firstPlace"></div>
      <div class="podiumBlock" id="secondPlace"></div>
      <div class="podiumBlock" id="thirdPlace"></div>
    </div>

```
<button onclick="resetPodium()">Back to Menu</button>
```

  </div>

</div>

<!-- ===== POPUP ===== -->

<div id="popup" class="hidden">
  <div id="popupContent">
    <canvas id="graphCanvas"></canvas>
    <button id="popupOk">OK</button>
  </div>
</div>

<!-- ===== JS (FIXED ORDER + DEFER) ===== -->

<!-- Core logic FIRST -->

<script src="js/gameLogic.js" defer></script>

<!-- UI modules -->

<script src="js/ui-trade.js" defer></script>

<script src="js/ui-info.js" defer></script>

<script src="js/ui-popup.js" defer></script>

<script src="js/ui-podium.js" defer></script>

<!-- Graph / extras -->

<script src="js/ui-graph.js" defer></script>

<!-- Entry point LAST -->

<script src="js/main.js" defer></script>

</body>
</html>
